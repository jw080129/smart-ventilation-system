<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Visual Traffic Green IDC</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; text-align: center; font-family: sans-serif; }
        canvas { display: block; background: #34495e; width: 100%; height: 300px; }
        .controls { padding: 20px; }
        .data-panel { font-size: 20px; margin: 10px; }
    </style>
</head>
<body>
    <canvas id="trafficCanvas"></canvas>
    <div class="controls">
        <button id="flowBtn" style="padding: 15px;">데이터 스트림 폭주 유발</button>
        <div class="data-panel">총 트래픽: <span id="val1">0</span>% | 최종 부하: <span id="val2">0</span>%</div>
        <label><input type="checkbox" id="greenSwitch"> 그린 컴퓨팅 최적화</label>
    </div>

<script>
    const canvas = document.getElementById('trafficCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let isFlowing = false;

    // 입자 클래스
    class Particle {
        constructor() { this.reset(); }
        reset() { this.x = Math.random() * canvas.width; this.y = 0; this.speed = 1 + Math.random() * 2; }
        update() { this.y += this.speed; if(this.y > canvas.height) this.reset(); }
        draw() { ctx.fillStyle = 'white'; ctx.fillRect(this.x, this.y, 2, 2); }
    }

    document.getElementById('flowBtn').addEventListener('click', () => { isFlowing = true; setTimeout(() => isFlowing = false, 5000); });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let count = isFlowing ? 200 : 10;
        while(particles.length < count) particles.push(new Particle());
        
        let activeLoad = isFlowing ? 100 : 15;
        let finalLoad = document.getElementById('greenSwitch').checked ? Math.round(activeLoad * 0.4) : activeLoad;

        document.getElementById('val1').innerText = activeLoad;
        document.getElementById('val2').innerText = finalLoad;

        particles.slice(0, count).forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
