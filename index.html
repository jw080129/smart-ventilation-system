<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mini Green Computing IDC Dashboard</title>
    <style>
        :root { --primary-color: #2ecc71; --danger-color: #e74c3c; --background-color: #f5f6fa; --card-color: #ffffff; --text-color: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--card-color); padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 560px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #1abc9c; }
        .subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 25px; }
        .btn { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 10px; color: white; }
        .btn-connect { background-color: #3498db; }
        .btn-filter { background-color: #9b59b6; }
        .panel { background: #f8f9fa; border: 1px solid #e9ecef; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: left; }
        .panel h3 { margin-top: 0; font-size: 16px; color: #34495e; border-bottom: 2px solid #1abc9c; padding-bottom: 5px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 5px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: filter 0.3s; }
        .display-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 16px; font-weight: bold; }
        .val-box { font-size: 18px; color: #2c3e50; }
        .switch-container { display: flex; justify-content: space-between; align-items: center; background: #e8f8f5; padding: 15px; border-radius: 8px; border: 2px solid #2ecc71; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(26px); }
        .status-box { font-size: 13px; color: #95a5a6; border-top: 1px solid #eee; padding-top: 15px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>미니 그린 컴퓨팅 시스템 (Green IDC)</h1>
    <div class="subtitle">필터링 연동 전력 최적화 대시보드</div>

    <button id="connectBtn" class="btn btn-connect">1. 아두이노 블루투스 인프라 연결</button>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="panel">
        <h3>📊 IDC 실시간 시스템 자원 모니터링</h3>
        <div class="display-row">
            <span>실제 실시간 종합 트래픽/부하</span>
            <span id="trafficDisplay" class="val-box">0%</span>
        </div>
        <div class="display-row">
            <span>서버 인프라 최종 전송 부하</span>
            <span id="loadDisplay" class="val-box" style="color: #3498db;">0%</span>
        </div>

        <button id="filterBtn" class="btn btn-filter">2. 실시간 영상 고해상도 필터링 가동</button>

        <div class="switch-container">
            <span style="color: #27ae60; font-weight: bold;">🟢 그린 컴퓨팅 활성화</span>
            <label class="switch"><input type="checkbox" id="greenSwitch"><span class="slider"></span></label>
        </div>
    </div>

    <div class="status-box" id="statusText">상태: 아두이노 블루투스 연결이 필요합니다.</div>
</div>

<script>
    let rx = null; 
    let player = null;
    let isFiltering = false;

    // 유튜브 로드
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);
    function onYouTubeIframeAPIReady() { player = new YT.Player('player', { height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ', playerVars: { 'playsinline': 1 } }); }

    // 고해상도 필터링 (토글 방식)
    document.getElementById('filterBtn').addEventListener('click', () => {
        // 기존 상태를 반전시킴 (true -> false, false -> true)
        isFiltering = !isFiltering;
        
        // 시각적 피드백 적용
        if (isFiltering) {
            document.querySelector('iframe').style.filter = 'blur(10px) grayscale(100%)';
            document.getElementById('statusText').innerText = "상태: 필터링 작동 중 (사용자 수동 제어)";
            document.getElementById('filterBtn').innerText = "2. 실시간 영상 필터링 종료";
        } else {
            document.querySelector('iframe').style.filter = 'none';
            document.getElementById('statusText').innerText = "상태: 필터링 대기 중";
            document.getElementById('filterBtn').innerText = "2. 실시간 영상 고해상도 필터링 가동";
        }
    });

    // 시스템 상태 업데이트 루프
    setInterval(() => {
        let base = (player && player.getPlayerState() === 1) ? 20 + Math.round(Math.random() * 10) : 0;
        let totalLoad = base + (isFiltering ? 40 : 0);
        
        let greenOn = document.getElementById('greenSwitch').checked;
        
        // [수정] 필터링 유지하되 전력 부하만 효율적으로 계산
        let finalLoad = greenOn ? Math.round(totalLoad * 0.45) : totalLoad;
        
        document.getElementById('trafficDisplay').innerText = Math.round(totalLoad) + "%";
        let loadEl = document.getElementById('loadDisplay');
        loadEl.innerText = Math.round(finalLoad) + "%";
        loadEl.style.color = greenOn ? 'var(--primary-color)' : '#3498db';

        if (rx) rx.writeValueWithoutResponse(new TextEncoder().encode(Math.round(finalLoad) + "\n"));
    }, 500);

    // 블루투스 연결
    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'HC' }], optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
            rx = await service.getCharacteristics().then(c => c[0]);
            document.getElementById('connectBtn').innerText = "✔ 연동 완료";
        } catch (e) { document.getElementById('statusText').innerText = "오류: 연결 실패"; }
    });
</script>
</body>
</html>
