<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>Green IDC Dashboard</title>
<style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    .btn { padding: 15px; width: 80%; margin: 10px; cursor: pointer; color: white; border: none; border-radius: 8px; }
    .btn-connect { background: #3498db; }
</style>
</head>
<body>
    <h1>Green IDC 시스템</h1>
    <button id="connectBtn" class="btn btn-connect">1. 아두이노 블루투스 연결</button>
    <div id="statusText">상태: 연결 대기 중</div>
    <div style="margin-top:20px;">
        <div>전압: <span id="volt">0.00</span> V</div>
        <div>전류: <span id="amp">0.00</span> A</div>
        <div>전력: <span id="watt">0.00</span> W</div>
    </div>

<script>
    let rx = null;
    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({ 
                acceptAllDevices: true, 
                optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"] 
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
            rx = await service.getCharacteristics().then(c => c[0]);
            
            document.getElementById('connectBtn').style.backgroundColor = "#2ecc71";
            document.getElementById('connectBtn').innerText = "✔ 연동 완료";
            
            await rx.startNotifications();
            rx.addEventListener('characteristicvaluechanged', (e) => {
                const data = new TextDecoder().decode(e.target.value).trim().split(',');
                if(data.length >= 3) {
                    document.getElementById('volt').innerText = data[0];
                    document.getElementById('amp').innerText = data[1];
                    document.getElementById('watt').innerText = data[2];
                }
            });
        } catch(e) { alert("연결 실패: " + e); }
    });

    setInterval(() => {
        if (rx) {
            // 임의의 트래픽 값 0~100 생성 (유튜브 재생 상태에 따라 조절하세요)
            let traffic = Math.floor(Math.random() * 100); 
            rx.writeValueWithoutResponse(new TextEncoder().encode(traffic + "\n"));
        }
    }, 1000);
</script>
</body>
</html>
