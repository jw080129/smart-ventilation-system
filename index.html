<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mini Green Computing IDC Dashboard</title>
    <style>
        :root { --primary-color: #2ecc71; --danger-color: #e74c3c; --background-color: #f5f6fa; --card-color: #ffffff; --text-color: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--card-color); padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 560px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #1abc9c; }
        .btn { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 10px; color: white; }
        .btn-connect { background-color: #3498db; }
        .btn-filter { background-color: #9b59b6; }
        .panel { background: #f8f9fa; border: 1px solid #e9ecef; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: left; }
        .panel h3 { margin-top: 0; font-size: 16px; color: #34495e; border-bottom: 2px solid #1abc9c; padding-bottom: 5px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 5px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: filter 0.3s; }
        .display-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 16px; font-weight: bold; }
        .val-box { font-size: 18px; color: #2c3e50; }
        .switch-container { display: flex; justify-content: space-between; align-items: center; background: #e8f8f5; padding: 15px; border-radius: 8px; border: 2px solid #2ecc71; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(26px); }
        .status-box { font-size: 13px; color: #95a5a6; border-top: 1px solid #eee; padding-top: 15px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>미니 그린 컴퓨팅 시스템 (Green IDC)</h1>
    <button id="connectBtn" class="btn btn-connect">1. 아두이노 블루투스 인프라 연결</button>
    <div class="video-container"><div id="player"></div></div>

    <div class="panel">
        <h3>📊 IDC 실시간 시스템 자원 모니터링</h3>
        <div class="display-row"><span>실제 실시간 종합 트래픽/부하</span><span id="trafficDisplay" class="val-box">0%</span></div>
        <div class="display-row"><span>서버 인프라 최종 전송 부하</span><span id="loadDisplay" class="val-box" style="color: #3498db;">0%</span></div>
        <hr style="border:0; border-top:1px solid #ddd; margin: 15px 0;">
        <h3 style="color: #e67e22;">⚡ 실시간 측정 데이터 (INA219)</h3>
        <div class="display-row"><span>실시간 전압</span><span id="voltDisplay" class="val-box">0.00 V</span></div>
        <div class="display-row"><span>실시간 전류</span><span id="ampDisplay" class="val-box">0.00 A</span></div>
        <div class="display-row"><span>실시간 전력</span><span id="wattDisplay" class="val-box">0.00 W</span></div>
        <button id="filterBtn" class="btn btn-filter" style="margin-top:15px;">2. 실시간 보안 모자이크 작동</button>
        <div class="switch-container">
            <span style="color: #27ae60; font-weight: bold;">🟢 그린 컴퓨팅 활성화</span>
            <label class="switch"><input type="checkbox" id="greenSwitch"><span class="slider"></span></label>
        </div>
    </div>
    <div class="status-box" id="statusText">상태: 아두이노 블루투스 연결이 필요합니다.</div>
</div>

<script>
    // notifyChar: 아두이노 -> 웹 (전압/전류/전력 알림 수신용)
    // writeChar : 웹 -> 아두이노 (트래픽 값 전송용)
    let notifyChar = null;
    let writeChar = null;
    let isWriting = false;   // GATT 쓰기 충돌(overlap) 방지 플래그
    let player = null;
    let isFiltering = false;

    // 유튜브 API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);
    function onYouTubeIframeAPIReady() { player = new YT.Player('player', { height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ', playerVars: { 'playsinline': 1 } }); }

    // 보안 모자이크
    document.getElementById('filterBtn').addEventListener('click', () => {
        isFiltering = !isFiltering;
        document.querySelector('iframe').style.filter = isFiltering ? 'blur(8px) contrast(150%)' : 'none';
        document.getElementById('filterBtn').innerText = isFiltering ? "2. 실시간 보안 모자이크 종료" : "2. 실시간 보안 모자이크 작동";
    });

    // 블루투스 연결 및 데이터 수신
    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
            const characteristics = await service.getCharacteristics();

            // [핵심 수정] c[0]을 무작정 쓰지 않고, properties를 확인해서
            // notify 가능한 특성과 write 가능한 특성을 각각 명확히 찾는다.
            characteristics.forEach(c => {
                if (c.properties.notify && !notifyChar) notifyChar = c;
                if ((c.properties.write || c.properties.writeWithoutResponse) && !writeChar) writeChar = c;
            });
            // 모듈에 특성이 하나뿐이라 notify/write를 겸하는 경우 대비
            if (!writeChar) writeChar = notifyChar;
            if (!notifyChar) notifyChar = writeChar;

            if (!notifyChar || !writeChar) {
                throw new Error("알림(notify) 또는 쓰기(write) 가능한 캐릭터리스틱을 찾지 못했습니다.");
            }

            document.getElementById('connectBtn').style.backgroundColor = "#2ecc71";
            document.getElementById('connectBtn').innerText = "✔ 연동 완료";
            document.getElementById('statusText').innerText = "상태: 데이터 수신 중...";

            await notifyChar.startNotifications();
            notifyChar.addEventListener('characteristicvaluechanged', (event) => {
                let data = new TextDecoder().decode(event.target.value).trim().split(',');
                if (data.length >= 3) {
                    document.getElementById('voltDisplay').innerText = data[0] + " V";
                    document.getElementById('ampDisplay').innerText = data[1] + " A";
                    document.getElementById('wattDisplay').innerText = data[2] + " W";
                }
            });
        } catch (e) {
            alert("연결 실패: " + e);
            console.error("블루투스 연결 오류:", e);
        }
    });

    // 메인 로직: 트래픽 계산 및 아두이노 전송
    setInterval(async () => {
        let base = (player && typeof player.getPlayerState === 'function' && player.getPlayerState() === 1) ? 20 + Math.round(Math.random() * 10) : 0;
        let totalLoad = base + (isFiltering ? 40 : 0);
        let greenOn = document.getElementById('greenSwitch').checked;
        let finalLoad = greenOn ? Math.round(totalLoad * (0.35 + (totalLoad / 200))) : totalLoad;

        document.getElementById('trafficDisplay').innerText = Math.round(totalLoad) + "%";
        document.getElementById('loadDisplay').innerText = Math.round(finalLoad) + "%";

        // [핵심 수정] 이전 쓰기가 아직 끝나지 않았으면 이번 전송은 건너뛴다.
        // (겹쳐서 호출하면 "GATT operation already in progress" 에러로 조용히 실패함)
        if (writeChar && !isWriting) {
            isWriting = true;
            try {
                const payload = new TextEncoder().encode(Math.round(finalLoad) + "\n");
                if (writeChar.properties.writeWithoutResponse) {
                    await writeChar.writeValueWithoutResponse(payload);
                } else {
                    await writeChar.writeValue(payload);
                }
            } catch (err) {
                console.error("트래픽 전송 실패:", err);
            } finally {
                isWriting = false;
            }
        }
    }, 500);
</script>
</body>
</html>
