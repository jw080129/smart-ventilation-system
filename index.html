<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Integrated Green IDC Dashboard</title>
    <!-- 기존 스타일 유지 -->
    <style>
        :root { --primary-color: #2ecc71; --danger-color: #e74c3c; --background-color: #f5f6fa; --card-color: #ffffff; --text-color: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--card-color); padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 560px; text-align: center; }
        .btn { width: 100%; padding: 15px; margin-bottom: 10px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .btn-filter { background-color: #9b59b6; }
        .btn-multi { background-color: #e67e22; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
        .video-container iframe { position: absolute; width: 100%; height: 100%; transition: filter 0.3s; }
        .display-row { display: flex; justify-content: space-between; margin: 10px 0; font-weight: bold; }
        .switch-container { display: flex; justify-content: space-between; align-items: center; background: #e8f8f5; padding: 15px; border-radius: 8px; border: 2px solid #2ecc71; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>

<div class="container">
    <h1>그린 컴퓨팅 시스템 (Green IDC)</h1>
    <div id="player"></div>
    <div id="extraVideos" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:5px;"></div>

    <div class="panel">
        <div class="display-row"><span>실시간 종합 부하</span><span id="trafficDisplay">0%</span></div>
        <div class="display-row"><span>최종 전송 부하</span><span id="loadDisplay" style="color:#3498db">0%</span></div>
        
        <button id="filterBtn" class="btn btn-filter">2. 영상 고해상도 필터링</button>
        <button id="multiBtn" class="btn btn-multi">3. 멀티-스트리밍 활성화</button>

        <div class="switch-container">
            <span style="color: #27ae60; font-weight: bold;">🟢 그린 컴퓨팅 활성화</span>
            <label class="switch"><input type="checkbox" id="greenSwitch"><span class="slider"></span></label>
        </div>
    </div>
</div>

<script>
    let rx = null; // 아두이노 연결용
    let isFiltering = false;
    let isMulti = false;

    // 필터링 버튼 동작
    document.getElementById('filterBtn').addEventListener('click', () => {
        isFiltering = true;
        document.querySelector('iframe').style.filter = 'blur(10px) grayscale(100%)';
        setTimeout(() => { isFiltering = false; document.querySelector('iframe').style.filter = 'none'; }, 5000);
    });

    // 멀티-스트리밍 버튼 동작
    document.getElementById('multiBtn').addEventListener('click', () => {
        isMulti = true;
        document.getElementById('extraVideos').innerHTML = `<div style="background:#000; height:100px;"></div><div style="background:#000; height:100px;"></div>`;
        setTimeout(() => { isMulti = false; document.getElementById('extraVideos').innerHTML = ''; }, 7000);
    });

    // 상태 동기화 및 전력 최적화 로직
    setInterval(() => {
        let base = 20;
        let total = (isFiltering ? 40 : 0) + (isMulti ? 40 : 0) + base; // 부하 합산
        
        let greenOn = document.getElementById('greenSwitch').checked;
        if (greenOn && (isFiltering || isMulti)) {
            isFiltering = false; isMulti = false; // 그린 컴퓨팅 개입: 연산 및 스트림 강제 중단
            document.querySelector('iframe').style.filter = 'none';
            document.getElementById('extraVideos').innerHTML = '';
        }

        let final = greenOn ? Math.round(total * 0.4) : total;
        document.getElementById('trafficDisplay').innerText = Math.round(total) + "%";
        let el = document.getElementById('loadDisplay');
        el.innerText = Math.round(final) + "%";
        el.style.color = greenOn ? 'var(--primary-color)' : '#3498db';
    }, 500);
</script>
</body>
</html>
