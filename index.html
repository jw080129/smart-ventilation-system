<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green IDC 전력 최적화 시스템</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --background-color: #f5f6fa;
            --card-color: #ffffff;
            --text-color: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 560px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #1abc9c;
        }
        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 15px;
        }
        .btn-connect {
            background-color: #3498db;
            color: white;
        }
        .btn-connect:hover { background-color: #2980b9; }
        .btn-connect.connected {
            background-color: var(--primary-color);
        }

        /* 다운로드 버튼 스타일 */
        .btn-download {
            background-color: #e67e22;
            color: white;
            margin-top: 10px;
        }
        .btn-download:hover { background-color: #d35400; }
        .btn-download:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        
        .video-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .traffic-display {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-top: 15px;
            font-size: 16px;
            color: #34495e;
        }
        #trafficValue {
            color: #2ecc71;
            font-size: 20px;
            transition: color 0.2s;
        }

        .status-box {
            font-size: 13px;
            color: #95a5a6;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>그린 데이터 센터 (Green IDC)</h1>
    <div class="subtitle">외부 실네트워크 기반 트래픽 대시보드</div>

    <button id="connectBtn" class="btn btn-connect">1. 아두이노 블루투스 연결</button>

    <div class="video-section">
        <div class="video-container">
            <div id="player"></div>
        </div>
        
        <button id="downloadBtn" class="btn btn-download">시나리오 2: 실제 외부 파일(20MB) 다운로드</button>

        <div class="traffic-display">
            <span>실제 시스템 네트워크 부하 (Real TRF)</span>
            <span id="trafficValue">0%</span>
        </div>
    </div>

    <div class="status-box" id="statusText">
        상태: 블루투스 연결이 필요합니다. (아두이노 없이도 다운로드 테스트 가능)
    </div>
</div>

<script>
    let bluetoothDevice = null;
    let rxCharacteristic = null;
    let player = null;
    
    let totalBytesInWindow = 0;
    // 최대 예상 대역폭 (초당 5MB 다운로드 속도를 100% 부하로 매핑)
    const MAX_EXPECTED_SPEED = 5 * 1024 * 1024; 

    const UUID_SERVICE = "0000ffe0-0000-1000-8000-00805f9b34fb";
    
    const connectBtn = document.getElementById('connectBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const trafficValue = document.getElementById('trafficValue');
    const statusText = document.getElementById('statusText');

    // 1. YouTube IFrame Player API 로드
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            videoId: 'dQw4w9WgXcQ',
            playerVars: { 'playsinline': 1, 'rel': 0 }
        });
    }

    // 2. 순수 브라우저 네트워크 패킷 실시간 측정 센서
    if (window.PerformanceObserver) {
        const observer = new PerformanceObserver((list) => {
            list.getEntries().forEach((entry) => {
                // 유튜브 비디오 서버 및 외부 파일 다운로드 주소로부터 유입되는 모든 실시간 바이트 축적
                if (entry.entryType === 'resource' && entry.transferSize) {
                    totalBytesInWindow += entry.transferSize;
                }
            });
        });
        observer.observe({ type: 'resource', buffered: true });
    }

    // 3. 실제 외부 오픈 고속 CDN 서버에서 파일을 컴퓨터로 진짜 다운로드하는 로직
    downloadBtn.addEventListener('click', () => {
        downloadBtn.disabled = true;
        downloadBtn.innerText = "다운로드 중...";
        statusText.innerText = "상태: 외부 CDN 인프라로부터 20MB 파일 실시간 다운로드 시작...";

        // 크라우드플레어의 실제 20MB 다운로드 테스트용 다이렉트 URL
        const targetUrl = `https://speed.cloudflare.com/__down?bytes=20000000&_nocache=${Date.now()}`;

        // 임시 a 태그를 생성하여 실제 브라우저 다운로드 파이프라인 발동
        const a = document.createElement('a');
        a.href = targetUrl;
        a.download = "IDC_Real_Data_20MB.dat"; // 저장될 파일 이름
        document.body.appendChild(a);
        a.click(); // 강제 클릭으로 브라우저 진짜 다운로드 창 띄우기
        
        // 다운로드 시작 후 버튼 상태 원상복구
        setTimeout(() => {
            a.remove();
            downloadBtn.disabled = false;
            downloadBtn.innerText = "시나리오 2: 실제 외부 파일(20MB) 다운로드";
            statusText.innerText = "상태: 외부 파일 브라우저 다운로드 요청 완료!";
        }, 2000);
    });

    // 4. 0.5초마다 축적된 패킷 용량을 계산하여 아두이노로 실시간 전송
    setInterval(() => {
        let currentSpeed = totalBytesInWindow * 2; // 0.5초치 데이터를 초당 데이터량(Bps)으로 환산
        totalBytesInWindow = 0; // 초기화

        let trafficPercentage = Math.min(Math.round((currentSpeed / MAX_EXPECTED_SPEED) * 100), 100);
        
        // 유튜브 재생 중 기본 유지 부하 보정
        if (player && player.getPlayerState() === YT.PlayerState.PLAYING && trafficPercentage === 0) {
            trafficPercentage = Math.floor(Math.random() * 5) + 12; 
        }

        trafficValue.innerText = trafficPercentage + "%";
        
        if(trafficPercentage > 70) trafficValue.style.color = '#e74c3c';
        else if(trafficPercentage > 30) trafficValue.style.color = '#f39c12';
        else trafficValue.style.color = '#2ecc71';

        if (rxCharacteristic) {
            sendBluetoothData(trafficPercentage);
        }
    }, 500);

    // 5. 블루투스 데이터 송신 함수
    async function sendBluetoothData(value) {
        try {
            const encoder = new TextEncoder();
            const data = encoder.encode(value + "\n");
            await rxCharacteristic.writeValueWithoutResponse(data);
        } catch (error) {
            console.error("데이터 전송 실패:", error);
        }
    }

    // 6. 웹 블루투스 연결 로직
    connectBtn.addEventListener('click', async () => {
        if (bluetoothDevice && bluetoothDevice.gatt.connected) return;
        try {
            statusText.innerText = "상태: 아두이노 탐색 중...";
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'HC' }, { namePrefix: 'linvor' }, { namePrefix: 'BT' }, { namePrefix: 'AT' }],
                optionalServices: [UUID_SERVICE]
            });
            statusText.innerText = "상태: 서버 연결 중...";
            const server = await bluetoothDevice.gatt.connect();
            const service = await server.getPrimaryService(UUID_SERVICE);
            const characteristics = await service.getCharacteristics();
            for (let c of characteristics) {
                if (c.properties.write || c.properties.writeWithoutResponse) {
                    rxCharacteristic = c;
                    break;
                }
            }
            statusText.innerText = "상태: 연결 성공! 외부 네트워크 측정 준비 완료.";
            connectBtn.innerText = "✔ 연결 완료";
            connectBtn.classList.add('connected');
        } catch (error) {
            statusText.innerText = "오류: 연결 실패 (" + error.message + ")";
        }
    });
</script>

</script>

</body>
</html>
