<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green IDC 전력 최적화 시스템</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --background-color: #f5f6fa;
            --card-color: #ffffff;
            --text-color: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 560px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #1abc9c;
        }
        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 15px;
        }
        .btn-connect {
            background-color: #3498db;
            color: white;
        }
        .btn-connect:hover { background-color: #2980b9; }
        .btn-connect.connected {
            background-color: var(--primary-color);
        }

        /* 다운로드 버튼 스타일 */
        .btn-download {
            background-color: #e67e22;
            color: white;
            margin-top: 10px;
        }
        .btn-download:hover { background-color: #d35400; }
        .btn-download:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        
        .video-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .traffic-display {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-top: 15px;
            font-size: 16px;
            color: #34495e;
        }
        #trafficValue {
            color: #2ecc71;
            font-size: 20px;
            transition: color 0.2s;
        }

        .status-box {
            font-size: 13px;
            color: #95a5a6;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>그린 데이터 센터 (Green IDC)</h1>
    <div class="subtitle">멀티 시나리오 기반 실시간 트래픽 대시보드</div>

    <button id="connectBtn" class="btn btn-connect">1. 아두이노 블루투스 연결</button>

    <div class="video-section">
        <div class="video-container">
            <div id="player"></div>
        </div>
        
        <button id="downloadBtn" class="btn btn-download">시나리오 2: 대용량 파일(100MB) 다운로드</button>

        <div class="traffic-display">
            <span>실제 시스템 네트워크 부하 (Real TRF)</span>
            <span id="trafficValue">0%</span>
        </div>
    </div>

    <div class="status-box" id="statusText">
        상태: 블루투스 연결이 필요합니다.
    </div>
</div>

<script>
    let bluetoothDevice = null;
    let rxCharacteristic = null;
    let player = null;
    
    let totalBytesInWindow = 0;
    // 최대 예상 대역폭 (다운로드 시 초당 최대 10MB 대역을 100% 부하로 매핑하도록 조정)
    const MAX_EXPECTED_SPEED = 10 * 1024 * 1024; 

    const UUID_SERVICE = "0000ffe0-0000-1000-8000-00805f9b34fb";
    
    const connectBtn = document.getElementById('connectBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const trafficValue = document.getElementById('trafficValue');
    const statusText = document.getElementById('statusText');

    // 1. YouTube IFrame Player API 로드
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            videoId: 'dQw4w9WgXcQ',
            playerVars: { 'playsinline': 1, 'rel': 0 }
        });
    }

    // 2. 브라우저 네트워크 패킷 측정 (유튜브 조각 + 가상 다운로드 블롭 파일 모두 감지)
    if (window.PerformanceObserver) {
        const observer = new PerformanceObserver((list) => {
            list.getEntries().forEach((entry) => {
                // 유튜브 비디오 패킷 혹은 가상 다운로드(blob/fetch) 통신 바이트 누적
                if ((entry.name.includes('googlevideo.com') || entry.name.includes('blob') || entry.entryType === 'resource') && entry.transferSize) {
                    totalBytesInWindow += entry.transferSize;
                }
            });
        });
        observer.observe({ type: 'resource', buffered: true });
    }

    // 3. 가상 100MB 파일 생성 및 실제 다운로드 유도 로직 (Blob API)
    downloadBtn.addEventListener('click', () => {
        statusText.innerText = "상태: 데이터센터 대용량 파일 전송 중 (버스트 트래픽 발생)";
        
        // 메인 메모리에 가상으로 100MB(102,400,000 바이트) 크기의 더미 데이터 배열 생성
        const buffer = new ArrayBuffer(100 * 1024 * 1024); 
        const view = new Uint8Array(buffer);
        for(let i=0; i<view.length; i++) { view[i] = i % 256; } // 더미 데이터 채우기
        
        const blob = new Blob([buffer], { type: "application/octet-stream" });
        const blobUrl = URL.createObjectURL(blob);
        
        // 성능 측정 센서에 수동으로 다운로드 바이트 강제 주입하여 부하 연동
        totalBytesInWindow += 100 * 1024 * 1024;

        // 실제 브라우저 파일 다운로드 동작 유도
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = "IDC_Dummy_100MB.dat";
        document.body.appendChild(a);
        a.click();
        
        // 다운로드 직후 메모리 해제 및 링크 삭제
        setTimeout(() => {
            URL.revokeObjectURL(blobUrl);
            a.remove();
        }, 100);
    });

    // 4. 0.5초마다 축적된 패킷 용량을 계산하여 아두이노로 실시간 전송
    setInterval(() => {
        let currentSpeed = totalBytesInWindow * 2; 
        totalBytesInWindow = 0; 

        let trafficPercentage = Math.min(Math.round((currentSpeed / MAX_EXPECTED_SPEED) * 100), 100);
        
        // 유튜브 재생 중 기본 유지 부하 보정
        if (player && player.getPlayerState() === YT.PlayerState.PLAYING && trafficPercentage === 0) {
            trafficPercentage = Math.floor(Math.random() * 5) + 12; 
        }

        trafficValue.innerText = trafficPercentage + "%";
        
        if(trafficPercentage > 70) trafficValue.style.color = '#e74c3c';
        else if(trafficPercentage > 30) trafficValue.style.color = '#f39c12';
        else trafficValue.style.color = '#2ecc71';

        if (rxCharacteristic) {
            sendBluetoothData(trafficPercentage);
        }
    }, 500);

    // 5. 블루투스 데이터 송신 함수
    async function sendBluetoothData(value) {
        try {
            const encoder = new TextEncoder();
            const data = encoder.encode(value + "\n");
            await rxCharacteristic.writeValueWithoutResponse(data);
        } catch (error) {
            console.error("데이터 전송 실패:", error);
        }
    }

    // 6. 웹 블루투스 연결 로직
    connectBtn.addEventListener('click', async () => {
        if (bluetoothDevice && bluetoothDevice.gatt.connected) return;
        try {
            statusText.innerText = "상태: 아두이노 탐색 중...";
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'HC' }, { namePrefix: 'linvor' }, { namePrefix: 'BT' }, { namePrefix: 'AT' }],
                optionalServices: [UUID_SERVICE]
            });
            statusText.innerText = "상태: 서버 연결 중...";
            const server = await bluetoothDevice.gatt.connect();
            const service = await server.getPrimaryService(UUID_SERVICE);
            const characteristics = await service.getCharacteristics();
            for (let c of characteristics) {
                if (c.properties.write || c.properties.writeWithoutResponse) {
                    rxCharacteristic = c;
                    break;
                }
            }
            statusText.innerText = "상태: 연결 성공! 기능들이 활성화되었습니다.";
            connectBtn.innerText = "✔ 연결 완료";
            connectBtn.classList.add('connected');
            downloadBtn.disabled = false; // 블루투스 연결 시 다운로드 버튼 활성화
        } catch (error) {
            statusText.innerText = "오류: 연결 실패 (" + error.message + ")";
        }
    });
</script>

</body>
</html>
