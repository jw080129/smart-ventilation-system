<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Green Computing IDC Dashboard</title>
    <style>
        :root { --primary-color: #2ecc71; --danger-color: #e74c3c; --background-color: #f5f6fa; --card-color: #ffffff; --text-color: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--card-color); padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 560px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #1abc9c; }
        .subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 25px; }
        .btn { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 15px; }
        .btn-connect { background-color: #3498db; color: white; }
        .btn-connect.connected { background-color: var(--primary-color); }
        .btn-filter { background-color: #9b59b6; color: white; }
        .panel { background: #f8f9fa; border: 1px solid #e9ecef; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: left; }
        .panel h3 { margin-top: 0; font-size: 16px; color: #34495e; border-bottom: 2px solid #1abc9c; padding-bottom: 5px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: none; transition: filter 0.3s; }
        .display-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 16px; font-weight: bold; }
        .val-box { font-size: 18px; color: #2c3e50; }
        .switch-container { display: flex; justify-content: space-between; align-items: center; background: #e8f8f5; padding: 15px; border-radius: 8px; margin-top: 15px; border: 2px solid #2ecc71; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(26px); }
        .status-box { font-size: 13px; color: #95a5a6; border-top: 1px solid #eee; padding-top: 15px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>미니 그린 컴퓨팅 시스템 (Green IDC)</h1>
    <div class="subtitle">실제 영상 필터링 연동 전력 최적화 대시보드</div>

    <button id="connectBtn" class="btn btn-connect">1. 아두이노 블루투스 인프라 연결</button>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="panel">
        <h3>📊 IDC 실시간 시스템 자원 모니터링</h3>
        <div class="display-row">
            <span>실제 실시간 종합 트래픽/부하</span>
            <span id="trafficDisplay" class="val-box">0%</span>
        </div>
        <div class="display-row">
            <span>서버 인프라 최종 전송 부하</span>
            <span id="loadDisplay" class="val-box" style="color: #3498db;">0%</span>
        </div>

        <button id="filterBtn" class="btn btn-filter">2. 실시간 영상 고해상도 필터링 가동</button>

        <div class="switch-container">
            <span style="color: #27ae60; font-weight: bold;">🟢 그린 컴퓨팅 (지능형 프레임 제어)</span>
            <label class="switch"><input type="checkbox" id="greenSwitch"><span class="slider"></span></label>
        </div>
    </div>

    <div class="status-box" id="statusText">상태: 아두이노 블루투스 연결이 필요합니다.</div>
</div>

<script>
    let rxCharacteristic = null;
    let player = null;
    let isFiltering = false;

    // 유튜브 API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', { height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ', playerVars: { 'playsinline': 1 } });
    }

    // 필터링 버튼 동작
    document.getElementById('filterBtn').addEventListener('click', () => {
        isFiltering = true;
        document.querySelector('iframe').style.filter = 'blur(10px) grayscale(100%)';
        statusText.innerText = "연산 중: 실시간 고해상도 이미지 필터링 알고리즘 가동 중...";
        setTimeout(() => {
            isFiltering = false;
            document.querySelector('iframe').style.filter = 'none';
            statusText.innerText = "상태: 필터링 종료. 자원 안정화.";
        }, 5000);
    });

    // 메인 루프 (상태 동기화)
    setInterval(() => {
        let baseLoad = (player && player.getPlayerState() === 1) ? 20 + Math.random() * 10 : 0;
        let totalLoad = isFiltering ? 100 : baseLoad;
        
        // 그린 컴퓨팅 적용 로직
        let finalLoad = document.getElementById('greenSwitch').checked ? Math.round(totalLoad * 0.45 + Math.random() * 5) : totalLoad;

        document.getElementById('trafficDisplay').innerText = Math.round(totalLoad) + "%";
        document.getElementById('loadDisplay').innerText = finalLoad + "%";

        if (rxCharacteristic) {
            const encoder = new TextEncoder();
            rxCharacteristic.writeValueWithoutResponse(encoder.encode(finalLoad + "\n"));
        }
    }, 500);

    // 블루투스 연결 (기존 로직 유지)
    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'HC' }], optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
            rxCharacteristic = await service.getCharacteristics().then(c => c[0]);
            document.getElementById('connectBtn').innerText = "✔ 연동 완료";
            document.getElementById('connectBtn').classList.add('connected');
        } catch (e) { statusText.innerText = "오류: 연결 실패"; }
    });
</script>

</body>
</html>
